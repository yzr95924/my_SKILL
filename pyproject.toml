# 仓库内唯一的 Python 工具链配置。
# 这里不发布 Python 包，仅为 ruff 提供 [tool.ruff.*] 配置入口。
#
# 与代码现状的对齐：
# - 仓库脚本最低支持 Python 3.7（2026-07-01 起放弃 CentOS 7/3.6 兼容）。
#   target-version = "py37" 禁用 PEP 604（X | Y，3.10+）与 PEP 585（list[X]，3.9+），
#   故类型注解走 Optional/List/Tuple、union 用 Optional[X] 而非 X | None。
# - 行宽与 .markdownlint.jsonc MD013 对齐，120 列。

[tool.ruff]
target-version = "py37"
line-length = 120
src = ["yzr-skill-creator", "gemini-paper-summary"]
extend-exclude = [
  ".agents",
  ".claude",
  "dist",
  "build",
]

[tool.ruff.lint]
# 启用的规则族：
# E/W = pycodestyle，F = pyflakes（未用 import / 未定义名），
# I = isort（import 排序），B = flake8-bugbear（常见陷阱），
# UP = pyupgrade（受 target-version=py37 约束，不会建议 PEP 585/604）。
select = ["E", "W", "F", "I", "B", "UP"]
ignore = [
  # 与 ruff format 冲突的规则；让 formatter 决定行宽相关的换行。
  "E501",
  # 仓库脚本沿用 subprocess 的 universal_newlines=True / stdout/stderr=PIPE 写法
  # （既有风格；py37 target 下 ruff 默认会建议替换为 text/capture_output，这里显式禁用）。
  "UP021",
  "UP022",
]

[tool.ruff.lint.isort]
known-first-party = ["scripts"]

[tool.ruff.format]
# 默认：双引号、自动换行、保留 trailing comma 触发 magic line。
quote-style = "double"
indent-style = "space"
